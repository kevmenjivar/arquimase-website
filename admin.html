<!doctype html><html lang="es"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Arquimase | Panel</title><link rel="stylesheet" href="admin.css"><body><header><img src="assets/arquimase-logo.png" alt="Arquimase"><a href="/index.html" target="_blank">Ver sitio ↗</a></header><main><p>ADMINISTRACIÓN LOCAL</p><h1>Contenido<br>del sitio.</h1><div id="notice"></div><section><h2>Nuevo proyecto</h2><form id="project"><input required name="title" placeholder="Título del proyecto"><select name="category"><option value="turismo">Turismo</option><option value="tratamiento">Planta de tratamiento</option><option value="remodelacion">Remodelación</option></select><input name="location" placeholder="Ubicación"><textarea required name="description" placeholder="Descripción"></textarea><select name="format" id="format"><option value="beforeAfter">Antes y después</option><option value="phases">Por fases</option></select><div id="ba"><label>Imagen antes<input type="file" name="before" accept="image/*"></label><label>Imagen después<input type="file" name="after" accept="image/*"></label><textarea name="baDescription" placeholder="Descripción del cambio"></textarea></div><div id="phases" hidden></div><button type="button" id="phase">+ Agregar fase</button><button>Guardar proyecto</button></form></section><section><h2>Logos de clientes</h2><form id="client"><input required name="name" placeholder="Nombre de marca"><input required type="file" name="logo" accept="image/*"><button>Subir logo</button></form><div id="clients"></div></section><section><h2>Imágenes de bloques</h2><div id="blocks"></div></section><section><h2>Proyectos publicados</h2><div id="projects"></div></section></main><script src="admin.js"></script></body></html>
